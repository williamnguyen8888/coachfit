spring:
  application:
    name: coachfit-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/coachfit}
    username: ${DATABASE_USERNAME:${DB_USER:coachfit}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:coachfit}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  url: ${APP_URL:http://localhost:3000}
  api-url: ${API_URL:http://localhost:8080}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    raw-files-bucket: ${MINIO_RAW_FILES_BUCKET:raw-files}
    workout-exports-bucket: ${MINIO_WORKOUT_EXPORTS_BUCKET:workout-exports}
    backups-bucket: ${MINIO_BACKUPS_BUCKET:backups}
  security:
    jwt-secret: ${JWT_SECRET:change-me}
    oauth-encryption-key: ${OAUTH_ENCRYPTION_KEY:change-me}
  providers:
    strava:
      client-id: ${STRAVA_CLIENT_ID:}
      client-secret: ${STRAVA_CLIENT_SECRET:}
      webhook-verify-token: ${STRAVA_WEBHOOK_VERIFY_TOKEN:}
    garmin:
      consumer-key: ${GARMIN_CONSUMER_KEY:}
      consumer-secret: ${GARMIN_CONSUMER_SECRET:}
