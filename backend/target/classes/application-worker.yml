spring:
  main:
    web-application-type: none
    banner-mode: off
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:8}   # Worker needs fewer connections than API
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    open-in-view: false

logging:
  level:
    root: INFO
