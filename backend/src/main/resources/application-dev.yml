spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/coachfit_dev}
    username: ${DATABASE_USERNAME:${DB_USER:coachfit}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:dev_password}}
  flyway:
    locations: classpath:db/migration,classpath:db/seed
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}

logging:
  level:
    root: INFO
    com.coachfit: DEBUG

app:
  security:
    refresh-cookie-secure: false  # HTTP is fine in local dev
