# Common Validation Messages
jakarta.validation.constraints.NotBlank.message=must not be blank
jakarta.validation.constraints.NotEmpty.message=must not be empty
jakarta.validation.constraints.NotNull.message=must not be null
jakarta.validation.constraints.Size.message=size must be between {min} and {max}
jakarta.validation.constraints.Email.message=must be a well-formed email address

# Custom Validation Messages
validation.email.required=Email is required.
validation.email.invalid=Please enter a valid email address.
validation.password.required=Password is required.
validation.password.length=Password must be at least 8 characters.
validation.fullname.required=Full name is required.
validation.zonetype.required=zoneType is required.
validation.zonename.required=zone name is required.

# Security & Errors
error.unauthorized=You are not authorized. Please log in.
error.forbidden=You do not have permission to access this resource.
error.notfound=The requested resource was not found.
error.internal=An unexpected error occurred. Please try again later.
error.badrequest=Invalid request syntax or parameters.
error.conflict=Resource conflict occurred.
error.ratelimit=Too many requests. Please try again later.

# Coaching Rating
coaching.rating.excellent=EXCELLENT
coaching.rating.good=GOOD
coaching.rating.inconsistent=INCONSISTENT
coaching.rating.underachieved=UNDERACHIEVED
coaching.rating.overachieved=OVERACHIEVED

# Coaching Summary Feedback
coaching.summary.excellent=Phenomenal execution of the planned session! You followed the workout instructions with extreme precision.
coaching.summary.good=Solid workout. You hit the key targets reasonably well, with minor deviations.
coaching.summary.inconsistent=The session had significant variation from the plan. Pacing or durations were uneven.
coaching.summary.underachieved=The workout was cut short. You did not accumulate enough time to meet the planned adaptation stimulus.
coaching.summary.overachieved=The workout intensity or duration was significantly higher than planned, which alters the targeted training effect.

# Coaching Duration Feedback
coaching.duration.spoton=Duration was spot on. You completed exactly the prescribed volume.
coaching.duration.shorter=The workout was shorter than planned by {0}%. Prescribed adaptation requires longer durations.
coaching.duration.longer=You overshot the planned duration by {0}%. Be cautious as excess volume extends recovery needs.

# Coaching Pacing Feedback
coaching.pacing.superb=Pacing strategy was superb. You controlled your power/heart rate perfectly during the high-intensity intervals.
coaching.pacing.struggled=You struggled to reach the target intensity zones during the main work steps.
coaching.pacing.inconsistent=Pacing was inconsistent. You started intervals too aggressively and faded, or overshot recovery targets.
coaching.pacing.default=Pacing control was well maintained.

# Coaching Recommendations
coaching.recommendation.recovery=Prioritize completing the full duration of recovery and warm-up steps to hit target volume.
coaching.recommendation.active=Stick to the planned durations, especially for active intervals, to manage fatigue.
coaching.recommendation.discipline=Excellent discipline. Keep using this pacing feedback to maintain structured efforts.
coaching.recommendation.rest=Make sure you are well rested before key intensity sessions to hit higher targets.
coaching.recommendation.recalibrate=Consider recalibrating your training zones if target zones feel too difficult.
coaching.recommendation.flat=Focus on a flat pacing profile. Do not start intervals too hard; distribute energy evenly.
coaching.recommendation.respect=Respect recovery steps: keep your heart rate/power low during recovery to prepare for the next step.
coaching.recommendation.default1=Continue monitoring target execution during structured workouts.
coaching.recommendation.default2=Review compliance graphs to spot micro-pacing adjustments.
