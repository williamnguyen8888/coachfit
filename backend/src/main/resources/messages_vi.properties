# Common Validation Messages (Tiếng Việt)
jakarta.validation.constraints.NotBlank.message=không được để trống
jakarta.validation.constraints.NotEmpty.message=không được bỏ rỗng
jakarta.validation.constraints.NotNull.message=không được để giá trị null
jakarta.validation.constraints.Size.message=kích thước phải nằm trong khoảng từ {min} đến {max}
jakarta.validation.constraints.Email.message=phải là địa chỉ email hợp lệ

# Custom Validation Messages
validation.email.required=Địa chỉ email là bắt buộc.
validation.email.invalid=Vui lòng nhập địa chỉ email hợp lệ.
validation.password.required=Mật khẩu là bắt buộc.
validation.password.length=Mật khẩu phải có độ dài ít nhất 8 ký tự.
validation.fullname.required=Họ và tên là bắt buộc.
validation.zonetype.required=Trường zoneType là bắt buộc.
validation.zonename.required=Tên zone là bắt buộc.

# Security & Errors
error.unauthorized=Bạn không có quyền truy cập. Vui lòng đăng nhập lại.
error.forbidden=Bạn không có quyền truy cập tài nguyên này.
error.notfound=Không tìm thấy tài nguyên yêu cầu.
error.internal=Có lỗi hệ thống xảy ra. Vui lòng thử lại sau.
error.badrequest=Cú pháp yêu cầu hoặc tham số không hợp lệ.
error.conflict=Tài nguyên yêu cầu đã bị trùng lặp hoặc xung đột.
error.ratelimit=Quá nhiều yêu cầu. Vui lòng thử lại sau.

# Coaching Rating
coaching.rating.excellent=XUẤT SẮC
coaching.rating.good=TỐT
coaching.rating.inconsistent=KHÔNG ĐỒNG ĐỀU
coaching.rating.underachieved=DƯỚI YÊU CẦU
coaching.rating.overachieved=VƯỢT YÊU CẦU

# Coaching Summary Feedback
coaching.summary.excellent=Thực hiện xuất sắc bài tập theo kế hoạch! Bạn đã tuân thủ cực kỳ chính xác hướng dẫn.
coaching.summary.good=Bài tập khá tốt. Bạn đã đạt hầu hết các mục tiêu chính, chỉ lệch một chút.
coaching.summary.inconsistent=Buổi tập có sự sai lệch lớn so với kế hoạch. Nhịp độ hoặc thời lượng tập không đồng đều.
coaching.summary.underachieved=Bài tập bị rút ngắn. Bạn chưa tích lũy đủ thời gian tập luyện để đạt hiệu quả kích thích thích nghi.
coaching.summary.overachieved=Cường độ hoặc thời lượng tập cao hơn đáng kể so với kế hoạch, làm thay đổi hiệu quả tập luyện dự kiến.

# Coaching Duration Feedback
coaching.duration.spoton=Thời lượng tập chuẩn xác. Bạn đã hoàn thành đúng khối lượng quy định.
coaching.duration.shorter=Thời lượng buổi tập ngắn hơn kế hoạch {0}%. Yêu cầu thích nghi đòi hỏi thời gian dài hơn.
coaching.duration.longer=Bạn tập quá thời lượng kế hoạch {0}%. Hãy lưu ý vì khối lượng dư thừa sẽ kéo dài thời gian phục hồi.

# Coaching Pacing Feedback
coaching.pacing.superb=Chiến thuật nhịp độ tuyệt vời. Bạn đã kiểm soát tốt công suất/nhịp tim trong các khoảng cường độ cao.
coaching.pacing.struggled=Bạn gặp khó khăn trong việc đạt đến các vùng cường độ mục tiêu trong các bước tập chính.
coaching.pacing.inconsistent=Nhịp độ không ổn định. Bạn bắt đầu các khoảng quá nhanh rồi đuối sức, hoặc tập quá nặng ở các bước phục hồi.
coaching.pacing.default=Nhịp độ được kiểm soát và duy trì tốt.

# Coaching Recommendations
coaching.recommendation.recovery=Ưu tiên hoàn thành đủ thời lượng của các bước phục hồi và khởi động để đạt đủ khối lượng mục tiêu.
coaching.recommendation.active=Tuân thủ đúng thời lượng kế hoạch, đặc biệt là các khoảng cường độ cao để quản lý mệt mỏi.
coaching.recommendation.discipline=Kỷ luật tập luyện rất tốt. Hãy tiếp tục duy trì việc theo dõi nhịp độ này.
coaching.recommendation.rest=Đảm bảo nghỉ ngơi tốt trước các buổi tập cường độ cao để đạt được mục tiêu tốt hơn.
coaching.recommendation.recalibrate=Cân nhắc đo và hiệu chỉnh lại các vùng tập luyện của bạn nếu thấy các mục tiêu quá khó đạt.
coaching.recommendation.flat=Tập trung duy trì nhịp độ ổn định. Đừng bắt đầu quá nhanh, hãy phân bổ năng lượng đều.
coaching.recommendation.respect=Tuân thủ các bước phục hồi: giữ nhịp tim/công suất ở mức thấp để chuẩn bị cho khoảng tập tiếp theo.
coaching.recommendation.default1=Tiếp tục theo dõi tiến trình thực hiện mục tiêu trong các bài tập có cấu trúc.
coaching.recommendation.default2=Xem lại biểu đồ compliance để điều chỉnh nhịp độ nhỏ kịp thời.
