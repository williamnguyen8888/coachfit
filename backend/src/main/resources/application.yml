spring:
  application:
    name: coachfit-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 51MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/coachfit}
    username: ${DATABASE_USERNAME:${DB_USER:coachfit}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:coachfit}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${API_URL:http://localhost:8080}/api/v1/auth/oauth/google/callback
            scope: openid,email,profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  url: ${APP_URL:http://localhost:3000}
  api-url: ${API_URL:http://localhost:8080}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    raw-files-bucket: ${MINIO_RAW_FILES_BUCKET:raw-files}
    workout-exports-bucket: ${MINIO_WORKOUT_EXPORTS_BUCKET:workout-exports}
    backups-bucket: ${MINIO_BACKUPS_BUCKET:backups}
  security:
    jwt-secret: ${JWT_SECRET:change-me-this-must-be-at-least-32-chars}
    oauth-encryption-key: ${OAUTH_ENCRYPTION_KEY:change-me-32-bytes-aes-key-padded!}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}         # 1 hour
    refresh-expiration-ms: ${REFRESH_EXPIRATION_MS:2592000000} # 30 days
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
  google:
    callback-url: ${API_URL:http://localhost:8080}/api/v1/auth/oauth/google/callback
  providers:
    strava:
      client-id: ${STRAVA_CLIENT_ID:}
      client-secret: ${STRAVA_CLIENT_SECRET:}
      redirect-uri: ${API_URL:http://localhost:8080}/api/v1/auth/oauth/strava/callback
      webhook-verify-token: ${STRAVA_WEBHOOK_VERIFY_TOKEN:}
    garmin:
      consumer-key: ${GARMIN_CONSUMER_KEY:}
      consumer-secret: ${GARMIN_CONSUMER_SECRET:}

