version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.coachfit.app
    depends_on:
      - backend-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod,api
      DATABASE_URL: jdbc:postgresql://postgres:5432/coachfit
      DATABASE_USERNAME: ${DB_USER:-coachfit}
      DATABASE_PASSWORD: ${DB_PASSWORD:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-change-me}
      APP_URL: ${APP_URL:-https://coachfit.app}
      API_URL: ${API_URL:-https://api.coachfit.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod,worker
      DATABASE_URL: jdbc:postgresql://postgres:5432/coachfit
      DATABASE_USERNAME: ${DB_USER:-coachfit}
      DATABASE_PASSWORD: ${DB_PASSWORD:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-change-me}
      APP_URL: ${APP_URL:-https://coachfit.app}
      API_URL: ${API_URL:-https://api.coachfit.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: coachfit
      POSTGRES_USER: ${DB_USER:-coachfit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-coachfit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_data:/var/www/certbot
    depends_on:
      - frontend
      - backend-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_data:
